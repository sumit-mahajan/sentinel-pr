<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#5845E8"/>
  <!-- three nodes + arrows representing the review graph -->
  <circle cx="7"  cy="16" r="3.5" fill="white"/>
  <circle cx="16" cy="16" r="3.5" fill="white"/>
  <!-- arrow 1 -->
  <line x1="11" y1="16" x2="12" y2="16" stroke="white" stroke-width="1.5"/>
  <polyline points="11.5,14.5 13,16 11.5,17.5" fill="none" stroke="white" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- arrow 2 -->
  <line x1="20" y1="16" x2="21" y2="16" stroke="white" stroke-width="1.5"/>
  <polyline points="20.5,14.5 22,16 20.5,17.5" fill="none" stroke="white" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- final node with checkmark -->
  <circle cx="25" cy="16" r="3.5" fill="white"/>
  <polyline points="23.5,16 24.7,17.2 26.8,14.8" fill="none" stroke="#5845E8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

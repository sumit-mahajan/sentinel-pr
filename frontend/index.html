<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>ReviewGraph — AI Code Review for GitHub</title>
    <meta name="description" content="Multi-agent AI code review that automatically catches security issues, performance regressions, architecture violations, and missing tests in your GitHub pull requests." />
    <meta name="theme-color" content="#5845E8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph -->
    <meta property="og:type"         content="website" />
    <meta property="og:title"        content="ReviewGraph — AI Code Review for GitHub" />
    <meta property="og:description"  content="Multi-agent AI code review that automatically catches security issues, performance regressions, architecture violations, and missing tests in your GitHub pull requests." />
    <meta property="og:image"        content="/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"    content="ReviewGraph" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ReviewGraph — AI Code Review for GitHub" />
    <meta name="twitter:description" content="Multi-agent AI code review for GitHub pull requests." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- Theme: read localStorage before React mounts to avoid flash -->
    <script>
      (function () {
        var t = localStorage.getItem('theme') || 'light';
        if (t === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

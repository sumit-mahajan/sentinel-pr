# Local dev mirrors production topology:
#   Docker  → api + worker (same backend/Dockerfile as Render)
#   Managed → Neon Postgres (pgvector) + Upstash Redis (from .env)
#
# Prerequisites: copy .env.example → .env and set DATABASE_URL, UPSTASH_*,
# GEMINI_API_KEY, GitHub App credentials, etc.
#
# Run: make dev   (or: docker compose up --build)

services:
  # ── FastAPI API server ────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    volumes:
      - ./backend/src:/app/src       # hot-reload in dev
      - ./backend/worker:/app/worker
    command: uv run uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Async worker (queue consumer) ────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    volumes:
      - ./backend/src:/app/src
      - ./backend/worker:/app/worker
    command: uv run python -m worker.main

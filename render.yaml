services:
  # ── API + worker (single free-tier container) ─────────────────────────────
  # Worker polls Postgres every ~5s in a background process (start.sh).
  - type: web
    name: pr-reviewer-api
    plan: free
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: ./start.sh
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_DAYS
        value: "7"
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY_B64
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com
      - key: FRONTEND_URL
        sync: false

# NOTE: Free-tier behaviour
#   - Single service spins down after 15 min inactivity (~30–60s cold start)
#   - Webhook returns 202 immediately; job row is safe in Postgres until worker polls
#   - Worker runs as a background process in the same container (no HTTP endpoint)
